version: 1
name: concierge_stream_persistence
intent: the mobile concierge streams a deterministic linked answer, records the
  request contract, and restores the conversation after reload
backend: agent-browser
coldStart: guest
viewport: { width: 390, height: 844 }
metadata:
  {
    feature: concierge,
    priority: critical,
    tags: [streaming, persistence, mobile, a11y],
  }
artifacts:
  capture:
    screenshots: always
    snapshots: always
    trace: on-failure
    storage: always

outcomes:
  - id: streamed_answer_is_restored
    description: the deterministic assistant answer and its project link remain after reload
    verify:
      script:
        run: |
          const dialog = document.querySelector('[role="dialog"]');
          const pageLink = dialog?.querySelector('a[href="/projects#project-cortex"]');
          const stored = sessionStorage.getItem("chat-messages-en") ?? "";
          const answer = "A deterministic archive answer.";
          return {
            ok: Boolean(dialog?.textContent?.includes(answer) && pageLink && stored.includes(answer)),
            evidence: {
              answerVisible: dialog?.textContent?.includes(answer) ?? false,
              pageLink: pageLink?.getAttribute("href") ?? null,
              persisted: stored.includes(answer)
            }
          };
  - id: chat_request_contract_is_localized
    description: the browser sends the English locale, message, and current path
      expected by the concierge route
    verify:
      script:
        run: |
          const storedRequest = sessionStorage.getItem("__cairn_last_chat_request");
          const request = storedRequest ? JSON.parse(storedRequest) : null;
          return {
            ok: request?.locale === "en" &&
              request?.body?.message === "What are you building right now?" &&
              request?.body?.currentPageUrl === "/",
            evidence: request ?? null
          };
  - id: concierge_fills_mobile_viewport
    description: the concierge behaves as a true full-screen dialog on mobile
    verify:
      script:
        run: |
          const dialog = document.querySelector('[role="dialog"]');
          const box = dialog?.getBoundingClientRect();
          const tolerance = 4;
          return {
            ok: Boolean(
              box && box.x <= tolerance && box.y <= tolerance &&
              Math.abs(box.width - innerWidth) <= tolerance &&
              Math.abs(box.height - innerHeight) <= tolerance
            ),
            evidence: box ? {
              x: box.x,
              y: box.y,
              width: box.width,
              height: box.height,
              viewport: { width: innerWidth, height: innerHeight }
            } : { dialog: null }
          };
  - id: concierge_has_no_blocking_wcag_issues
    description: the restored open concierge has no serious or critical A or AA violations
    verify:
      script: { runtime: browser, file: ../verifiers/axe-wcag.js }
  - id: concierge_stream_has_no_console_errors
    description: streaming and restoring the fixture produce no console errors
    verify:
      console: { errorsMax: 0 }

steps:
  - open: { path: /, waitUntil: networkidle, timeoutMs: 30000 }
  - click: { by: role, role: button, name: "Open the concierge" }
  - wait: { selector: '[role="dialog"]', timeoutMs: 10000 }
  - fill:
      by: label
      name: Message the concierge
      value: What are you building right now?
  - press: Enter
  - wait: { text: "A deterministic archive answer.", timeoutMs: 10000 }
  - open: { path: /, waitUntil: networkidle, timeoutMs: 30000 }
  - click: { by: role, role: button, name: "Open the concierge" }
  - wait: { text: "A deterministic archive answer.", timeoutMs: 10000 }
  - snapshot: { interactive: true, label: restored_concierge }
contractHash: sha256:14b4a910ccb5f211cfe4f6c682afcf3f7f88333d7c2a22da185d60670d533e1a
